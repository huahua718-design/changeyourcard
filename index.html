<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>AR 實體牌背魔術 (黑幕吞噬終極版)</title>
  
  <script>
    window.onerror = function(msg, url, lineNo) {
      alert("系統提示錯誤: " + msg + "\n行號: " + lineNo);
      return false;
    };
  </script>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

  <style>
    /* 🚀 核心修復 1：強制把 HTML 基礎層設為「透明」，才不會把 MindAR 墊在底下的相機蓋死 */
    html, body, #root {
      background-color: transparent !important; 
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      overflow: hidden;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }
    
    /* 確保手機畫面邊緣不會因為透明而露白，我們在最深處(z:-3)墊一張純黑畫布 */
    .base-black-bg {
      position: fixed; inset: 0; background-color: #000; z-index: -3;
    }
    
    .a-dialog-allow-button, .mindar-ui-overlay { display: none !important; }
    
    /* 相機畫面死死鎖在 z:-2 */
    video {
      z-index: -2 !important;
      object-fit: cover !important;
      opacity: 1 !important; 
    }

    /* 🚀 核心修復 2：AR 畫布必須高於黑幕層(z:10)，這樣黑幕吞噬相機時，AR 撲克牌才不會被一起吃掉 */
    .a-canvas {
      z-index: 20 !important;
      pointer-events: none !important;
    }

    /* 掙脫 AR 空間飛向螢幕正中央的 HTML 放大動畫 */
    @keyframes screenZoom {
      0% { transform: translate(-50%, -50%) scale(0.6); opacity: 0; }
      5% { transform: translate(-50%, -50%) scale(0.6); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    }
    .animate-screen-zoom {
      animation: screenZoom 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    /* 感光極速分子化消失 */
    @keyframes fastVanish {
      0% { opacity: 1; transform: translate(-50%, -50%) scale(1); filter: contrast(1) brightness(1); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(0.9); filter: contrast(2) brightness(1.5) blur(8px); }
    }
    .animate-fast-vanish {
      animation: fastVanish 0.1s ease-out forwards;
    }
  </style>

  <script>
    AFRAME.registerComponent('target-handler', {
      init: function () {
        this.el.addEventListener('targetFound', () => {
          if (window.currentPhase === 'WAIT_TARGET') {
            window.triggerRevealSlow();
            // 延遲 100 毫秒確保 React 狀態更新後，再觸發 5 秒漸顯動畫
            setTimeout(() => {
              const arImage = document.querySelector('#arCardImage');
              if (arImage) arImage.emit('startReveal');
            }, 100);
          }
        });
      }
    });
  </script>
</head>
<body>
  <div class="base-black-bg"></div>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;
    const EDGE_TOP = 0, EDGE_RIGHT = 1, EDGE_BOTTOM = 2, EDGE_LEFT = 3;

    function MagicCardApp() {
      const [phase, setPhase] = useState('START'); 
      const [magicianStrokes, setMagicianStrokes] = useState([]);
      const [finalCard, setFinalCard] = useState(null);
      const [rotationAngle, setRotationAngle] = useState(0);

      const canvasRef = useRef(null);
      const animFrameRef = useRef(null);
      const lastTapTime = useRef(0);
      const drawState = useRef({ isDrawing: false, startX: 0, startY: 0, currentX: 0, currentY: 0 });

      useEffect(() => { window.currentPhase = phase; }, [phase]);

      // 🎬 完美的電影級時序控制
      useEffect(() => {
        window.triggerRevealSlow = () => setPhase('REVEAL_SLOW');
        window.triggerVanish = () => setPhase('VANISH');

        if (phase === 'REVEAL_SLOW') {
          // 4. AR 漸顯與黑幕吞噬 (花費 5 秒) -> 進入停留階段
          const t = setTimeout(() => setPhase('REVEAL_STAY'), 5000);
          return () => clearTimeout(t);
        }
        if (phase === 'REVEAL_STAY') {
          // 5. 停留 (3 秒) -> 準備震懾放大
          const t = setTimeout(() => setPhase('REVEAL_ZOOM'), 3000);
          return () => clearTimeout(t);
        }
        if (phase === 'REVEAL_ZOOM') {
          // 6. 全螢幕放大，停留 (3 秒) -> 啟動感光待命
          const t = setTimeout(() => setPhase('DETECTION_ACTIVE'), 3000);
          return () => clearTimeout(t);
        }
      }, [phase]);

      // 👁️ 亮度感應常駐系統 (背地運作不受黑幕干擾)
      useEffect(() => {
        const checkLoop = () => {
          if (window.currentPhase === 'DETECTION_ACTIVE') {
            const video = document.querySelector('video'); 
            if (video && canvasRef.current) {
              const ctx = canvasRef.current.getContext('2d', { willReadFrequently: true });
              ctx.drawImage(video, 0, 0, 64, 64);
              const data = ctx.getImageData(0, 0, 64,
