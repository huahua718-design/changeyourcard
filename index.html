<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>AR Magic - Custom Sequence</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

  <style>
    /* 基礎環境強制鎖定 */
    html, body {
      margin: 0 !important; padding: 0 !important;
      width: 100% !important; height: 100% !important;
      overflow: hidden !important; background-color: #000 !important;
    }
    
    /* 相機與 AR 畫布置底填滿，由 A-Frame 自適應控制 */
    video, .a-canvas {
      position: absolute !important; top: 0 !important; left: 0 !important;
      width: 100% !important; height: 100% !important; object-fit: cover !important;
    }

    /* 隱藏 MindAR 預設 UI */
    .mindar-ui-overlay, .a-dialog-allow-button { display: none !important; }

    /* 5. 震懾結局：HTML 卡片瞬間掙脫飛向中央放大 */
    @keyframes screenCenterZoom {
      0% { transform: translate(-50%, -50%) scale(0.4); opacity: 0; }
      100% { transform: translate(-50%, -50%) scale(1.35); opacity: 1; }
    }
    .animate-card-zoom { animation: screenCenterZoom 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

    /* 手遮鏡頭：極速分子化灰飛煙滅 */
    @keyframes fastVanishEffect {
      0% { opacity: 1; transform: translate(-50%, -50%) scale(1.35); filter: blur(0px) brightness(1); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(0.2); filter: blur(20px) brightness(2.5); }
    }
    .animate-card-vanish { animation: fastVanishEffect 0.18s ease-in forwards; }
  </style>

  <script>
    // 全域追蹤鎖
    window.targetIsDetected = false;

    AFRAME.registerComponent('magic-tracker', {
      init: function () {
        this.el.addEventListener('targetFound', () => {
          window.targetIsDetected = true;
          if (window.onMagicTargetFound) window.onMagicTargetFound();
        });
        this.el.addEventListener('targetLost', () => {
          window.targetIsDetected = false;
        });
      }
    });
  </script>
</head>
<body>

  <a-scene 
    mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.2/examples/image-tracking/assets/card-example/targets.mind; autoStart: true; uiLoading: no; uiError: no;" 
    color-space="sRGB" 
    renderer="colorManagement: true, physicallyCorrectLights" 
    vr-mode-ui="enabled: false" 
    device-orientation-permission-ui="enabled: false"
    embedded
  >
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    <a-entity mindar-image-target="targetIndex: 0" magic-tracker>
       <a-image 
         id="virtualCard"
         src="https://raw.githubusercontent.com/hiukim/mind-ar-js/master/examples/image-tracking/assets/card-example/card.png" 
         position="0 0 0.01" 
         height="1" width="0.75" 
         material="opacity: 0; transparent: true;"
       ></a-image>
    </a-entity>
  </a-scene>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function MagicInterface() {
      // 魔術核心階段狀態機
      // SWIPE_1 (準備第一筆) -> SWIPE_2 (拉開黑幕，準備第二筆) -> SEARCHING (搜尋中) 
      // -> REVEAL_SLOW (鎖定！3秒黑幕/5秒顯影) -> REVEAL_ZOOM (飛向中央放大) -> DETECT_LIGHT (測光待命) -> VANISH (分子化消失)
      const [phase, setPhase] = useState('SWIPE_1');
      const [boxTransform, setBoxTransform] = useState('rotateX(0deg) rotateY(0deg)');
      const [boxOpacity, setBoxOpacity] = useState(1);
      const canvasRef = useRef(null);
      
      // 觸控座標記錄
      const touchStartPos = useRef({ x: 0, y: 0 });

      // 監聽 A-Frame 辨識成功事件
      useEffect(() => {
        window.onMagicTargetFound = () => {
          setPhase((currentPhase) => {
            if (currentPhase === 'SEARCHING') {
              startRevealSequence();
              return 'REVEAL_SLOW';
            }
            return currentPhase;
          });
        };
      }, []);

      // 保險鎖：如果切換到 SEARCHING 的瞬間，卡牌早已在鏡頭內，立刻啟動
      useEffect(() => {
        if (phase === 'SEARCHING' && window.targetIsDetected) {
          startRevealSequence();
          setPhase('REVEAL_SLOW');
        }
      }, [phase]);

      // 執行 4. 追蹤鎖定的 5 秒虛擬牌顯影動畫
      const startRevealSequence = () => {
        const arCard = document.querySelector('#virtualCard');
        if (arCard) {
          arCard.setAttribute('animation', 'property: components.material.material.opacity; from: 0; to: 1; dur: 5000; easing: linear;');
        }
      };

      // ⏱️ 魔術自動化電影級時序齒輪
      useEffect(() => {
        let clock;
        if (phase === 'REVEAL_SLOW') {
          // 5秒緩慢顯影完畢 -> 瞬間轉換至飛向螢幕正中央
          clock = setTimeout(() => setPhase('REVEAL_ZOOM'), 5000);
        } else if (phase === 'REVEAL_ZOOM') {
          // 放大停留 3 秒 -> 悄悄啟動環境光感應器
          clock = setTimeout(() => setPhase('DETECT_LIGHT'), 3000);
        }
        return () => clearTimeout(clock);
      }, [phase]);

      // 👁️ 高安全性環境光感應迴圈 (完美防禦 Script Error)
      useEffect(() => {
        let frameId;
        const scanBrightness = () => {
          if (phase === 'DETECT_LIGHT') {
            try {
              const video = document.querySelector('video');
              if (video && video.videoWidth > 0 && video.readyState >= 2 && canvasRef.current) {
                const ctx = canvasRef.current.getContext('2d', { willReadFrequently: true });
                ctx.drawImage(video, 0, 0, 64, 64);
                const frameData = ctx.getImageData(0, 0, 64, 64).data;
                
                let totalLight = 0;
                for (let i = 0; i < frameData.length; i += 16) {
                  totalLight += (frameData[i] + frameData[i+1] + frameData[i+2]) / 3;
                }
                const averageLight = totalLight / (frameData.length / 16);

                // 當手掌完全蓋住後置鏡頭時，環境亮度跌破 30
                if (averageLight < 30) {
                  setPhase('VANISH');
                  return; // 成功觸發結局，關閉測光
                }
              }
            } catch (error) {
              // 靜默保護未載入完成的視訊流
            }
          }
          frameId = requestAnimationFrame(scanBrightness);
        };

        if (phase === 'DETECT_LIGHT') {
          frameId = requestAnimationFrame(scanBrightness);
        }
        return () => cancelAnimationFrame(frameId);
      }, [phase]);

      // 👆 全螢幕全域觸控手勢判定 (解決只能點特定區域的 Bug)
      const onStageTouchStart = (e) => {
        touchStartPos.current = {
          x: e.touches[0].clientX,
          y: e.touches[0].clientY
        };
      };

      const onStageTouchEnd = (e) => {
        if (phase !== 'SWIPE_1' && phase !== 'SWIPE_2') return;

        const deltaX = e.changedTouches[0].clientX - touchStartPos.current.x;
        const deltaY = e.changedTouches[0].clientY - touchStartPos.current.y;
        const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);

        // 滑動判定閾值：移動超過 30 像素即視為有效劃牌
        if (distance > 30) {
          if (phase === 'SWIPE_1') {
            // 2. 第一筆劃下：計算方向，讓方塊順著滑動方向做 3D 翻轉 90 度
            if (Math.abs(deltaX) > Math.abs(deltaY)) {
              // 橫向滑動
              setBoxTransform(deltaX > 0 ? 'rotateY(90deg)' : 'rotateY(-90deg)');
            } else {
              // 縱向滑動
              setBoxTransform(deltaY > 0 ? 'rotateX(-90deg)' : 'rotateX(90deg)');
            }
            setPhase('SWIPE_2');
          } else if (phase === 'SWIPE_2') {
            // 3. 第二筆劃下：方塊淡出，進入 Searching 階段
            setBoxOpacity(0);
            setPhase('SEARCHING');
          }
        }
      };

      // 🖤 高精度全域動態黑幕樣式計算 (消除黑屏與排版異常)
      const getCurtainStyle = () => {
        const base = { position: 'absolute', inset: 0, backgroundColor: '#000', pointerEvents: 'none', zIndex: 10 };
        if (phase === 'SWIPE_1') {
          return { ...base, opacity: 1, transition: 'none' }; // 1. 初始全黑
        }
        if (phase === 'SWIPE_2' || phase === 'SEARCHING') {
          return { ...base, opacity: 0, transition: 'opacity 0.5s cubic-bezier(0.25, 1, 0.5, 1)' }; // 2. 0.5秒褪去透出相機
        }
        if (phase === 'REVEAL_SLOW' || phase === 'REVEAL_ZOOM' || phase === 'DETECT_LIGHT') {
          return { ...base, opacity: 1, transition: 'opacity 3.0s ease-in-out' }; // 4. 偵測到時，3秒緩慢吞噬實景
        }
        if (phase === 'VANISH') {
          return { ...base, opacity: 0, transition: 'opacity 0.2s ease-out' }; // 5. 結束時瞬間撤走
        }
        return base;
      };

      return (
        // 核心觸控攔截夾層：覆蓋全螢幕且權重最高，隨時接收魔術師手勢
        <div 
          className="fixed inset-0 z-[99999] w-full h-full"
          style={{ pointerEvents: (phase === 'SWIPE_1' || phase === 'SWIPE_2') ? 'auto' : 'none' }}
          onTouchStart={onStageTouchStart}
          onTouchEnd={onStageTouchEnd}
        >
          {/* 隱藏型環境光度運算畫布 */}
          <canvas ref={canvasRef} width="64" height="64" className="hidden" />

          {/* 電影級大黑幕 */}
          <div style={getCurtainStyle()} />

          {/* 文字與視覺元素層 (自動穿透點擊，不干擾觸控板) */}
          <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none p-6">
            
            {/* 頂端狀態文字 */}
            <div className="absolute top-16 text-center tracking-[0.3em] text-zinc-300 text-xs font-light transition-all duration-500">
              {phase === 'SWIPE_1' && 'Swipe to start'}
              {phase === 'SWIPE_2' && 'Swipe again'}
              {phase === 'SEARCHING' && (
                <span className="text-cyan-400 animate-pulse bg-zinc-950/60 px-5 py-2 rounded-full border border-cyan-950/50 backdrop-blur-sm">
                  Searching...
                </span>
              )}
            </div>

            {/* 中央互動 3D 翻轉方塊 */}
            {(phase === 'SWIPE_1' || phase === 'SWIPE_2' || phase === 'SEARCHING') && (
              <div 
                className="w-14 h-14 border border-dashed border-zinc-400 rounded-md transition-all ease-out"
                style={{ 
                  transform: boxTransform, 
                  opacity: boxOpacity,
                  transitionDuration: phase === 'SWIPE_2' ? '0.5s' : '0.3s',
                  perspective: '1000px'
                }}
              />
            )}

            {/* 5. 終極結局：撲克牌掙脫 3D 空間，在最頂層放大並待命消失 */}
            {(phase === 'REVEAL_ZOOM' || phase === 'DETECT_LIGHT' || phase === 'VANISH') && (
              <img 
                src="https://raw.githubusercontent.com/hiukim/mind-ar-js/master/examples/image-tracking/assets/card-example/card.png" 
                className={`absolute top-1/2 left-1/2 w-52 shadow-[0_0_60px_rgba(0,0,0,0.95)] origin-center ${phase === 'VANISH' ? 'animate-card-vanish' : 'animate-card-zoom'}`}
                alt="Magic Climax Card"
              />
            )}

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<MagicInterface />);
  </script>
</body>
</html>
