<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>AR Magic - Production Fix</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

  <style>
    /* 強制保證極致全螢幕，防止被任何外層框架壓扁 */
    html, body {
      margin: 0 !important; padding: 0 !important;
      width: 100% !important; height: 100% !important;
      overflow: hidden !important; background-color: #000 !important;
    }
    
    /* A-frame 自動產生的視訊與畫布，強迫填滿實景 */
    video, .a-canvas {
      position: absolute !important; top: 0 !important; left: 0 !important;
      width: 100% !important; height: 100% !important; object-fit: cover !important;
    }

    /* 隱藏 MindAR 預設的 UI 提示 */
    .mindar-ui-overlay, .a-dialog-allow-button { display: none !important; }

    /* 電影級動態放大效果 */
    @keyframes cardZoom {
      0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
      100% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
    }
    .animate-card-zoom { animation: cardZoom 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

    /* 煙消雲散粒子感特效 */
    @keyframes cardVanish {
      0% { opacity: 1; transform: translate(-50%, -50%) scale(1.3); filter: blur(0px) brightness(1); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(0.3); filter: blur(15px) brightness(2); }
    }
    .animate-card-vanish { animation: cardVanish 0.2s ease-in forwards; }
  </style>

  <script>
    // 全域變數：負責跨框架（A-Frame -> React）通訊
    window.arTargetFound = false;

    AFRAME.registerComponent('target-listener', {
      init: function () {
        this.el.addEventListener('targetFound', () => {
          window.arTargetFound = true;
          if (window.onTargetDetected) window.onTargetDetected();
        });
        this.el.addEventListener('targetLost', () => {
          window.arTargetFound = false;
        });
      }
    });
  </script>
</head>
<body>

  <a-scene 
    mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.2/examples/image-tracking/assets/card-example/targets.mind; autoStart: true; uiLoading: no; uiError: no;" 
    color-space="sRGB" 
    renderer="colorManagement: true, physicallyCorrectLights" 
    vr-mode-ui="enabled: false" 
    device-orientation-permission-ui="enabled: false"
    embedded
  >
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    <a-entity mindar-image-target="targetIndex: 0" target-listener>
       <a-image 
         id="arCardAsset"
         src="https://raw.githubusercontent.com/hiukim/mind-ar-js/master/examples/image-tracking/assets/card-example/card.png" 
         position="0 0 0.01" 
         height="1" width="0.75" 
         material="opacity: 0; transparent: true;"
       ></a-image>
    </a-entity>
  </a-scene>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function MagicStage() {
      // 核心魔術狀態機：START -> SWIPE_1 -> SWIPE_2 -> SEARCHING -> REVEAL_SLOW -> REVEAL_STAY -> REVEAL_ZOOM -> DETECT_LIGHT -> VANISH
      const [phase, setPhase] = useState('START');
      const [boxRotation, setBoxRotation] = useState(0);
      const canvasRef = useRef(null);
      const startY = useRef(0);

      // 當 A-Frame 監聽到圖卡時觸發的邏輯
      useEffect(() => {
        window.onTargetDetected = () => {
          // 只有在搜尋階段才會觸發顯影流程
          setPhase((current) => {
            if (current === 'SEARCHING') {
              triggerSlowReveal();
              return 'REVEAL_SLOW';
            }
            return current;
          });
        };
      }, []);

      // 防禦鎖：如果進入 SEARCHING 階段時圖卡本來就對準了，立即補發觸發
      useEffect(() => {
        if (phase === 'SEARCHING' && window.arTargetFound) {
          triggerSlowReveal();
          setPhase('REVEAL_SLOW');
        }
      }, [phase]);

      const triggerSlowReveal = () => {
        const el = document.querySelector('#arCardAsset');
        if (el) {
          el.setAttribute('animation', 'property: components.material.material.opacity; from: 0; to: 1; dur: 4000; easing: linear;');
        }
      };

      // 🕒 魔術自動化時間齒輪
      useEffect(() => {
        let timeout;
        if (phase === 'REVEAL_SLOW') {
          // 4秒顯影完畢 -> 轉入定格階段
          timeout = setTimeout(() => setPhase('REVEAL_STAY'), 4000);
        } else if (phase === 'REVEAL_STAY') {
          // 純黑背景定格 2.5 秒 -> 撲克牌突破 3D 空間飛向螢幕正中央
          timeout = setTimeout(() => setPhase('REVEAL_ZOOM'), 2500);
        } else if (phase === 'REVEAL_ZOOM') {
          // 放大飛出動畫播完 3 秒 -> 悄悄啟動環境光感應器
          timeout = setTimeout(() => setPhase('DETECT_LIGHT'), 3000);
        }
        return () => clearTimeout(timeout);
      }, [phase]);

      // 👁️ 安全防護型——光感應測光迴圈
      useEffect(() => {
        let frameId;
        const inspectBrightness = () => {
          if (phase === 'DETECT_LIGHT') {
            try {
              // 尋找各平台可能產生的相機 video 標籤
              const video = document.querySelector('video');
              if (video && canvasRef.current && video.readyState >= 2) {
                const ctx = canvasRef.current.getContext('2d', { willReadFrequently: true });
                ctx.drawImage(video, 0, 0, 64, 64);
                const pixels = ctx.getImageData(0, 0, 64, 64).data;
                
                let brightnessSum = 0;
                for (let i = 0; i < pixels.length; i += 16) {
                  brightnessSum += (pixels[i] + pixels[i+1] + pixels[i+2]) / 3;
                }
                const average = brightnessSum / (pixels.length / 16);

                // 臨界點臨界值：當手掌蓋住鏡頭使亮度大跌（低於 30）
                if (average < 30) {
                  setPhase('VANISH');
                  return; // 終止測光
                }
              }
            } catch (err) {
              console.log("Waiting for video stream data safely...");
            }
          }
          frameId = requestAnimationFrame(inspectBrightness);
        };

        if (phase === 'DETECT_LIGHT') {
          frameId = requestAnimationFrame(inspectBrightness);
        }
        return () => cancelAnimationFrame(frameId);
      }, [phase]);

      // 👆 完美的滑動手勢捕捉器
      const touchStart = (e) => { startY.current = e.touches[0].clientY; };
      const touchEnd = (e) => {
        const endY = e.changedTouches[0].clientY;
        const diff = startY.current - endY;

        if (diff > 40) { // 向上滑動超過 40 像素
          if (phase === 'SWIPE_1') {
            setBoxRotation(90);
            setPhase('SWIPE_2');
          } else if (phase === 'SWIPE_2') {
            setPhase('SEARCHING');
          }
        }
      };

      // 🖤 依據流程精心設計的「幕後黑布」樣式切換
      let curtainStyle = "absolute inset-0 bg-black transition-opacity pointer-events-none ";
      if (phase === 'START' || phase === 'SWIPE_1') {
        curtainStyle += "opacity-100 duration-0"; // 初始純黑不透光
      } else if (phase === 'SWIPE_2' || phase === 'SEARCHING') {
        curtainStyle += "opacity-0 duration-700"; // 劃下第一筆，黑幕優雅拉開，露出清晰相機畫面
      } else if (phase === 'REVEAL_SLOW' || phase === 'REVEAL_STAY' || phase === 'REVEAL_ZOOM' || phase === 'DETECT_LIGHT') {
        curtainStyle += "opacity-100 duration-[3000ms]"; // 一旦鎖定卡牌，現實世界在3秒內被黑暗吞噬
      } else if (phase === 'VANISH') {
        curtainStyle += "opacity-0 duration-300"; // 結束時黑布瞬間撤走，回歸現實
      }

      return (
        <div className="fixed inset-0 z-[9999] w-full h-full pointer-events-none font-sans select-none -webkit-user-select-none">
          {/* 用於測光分析的隱藏迷你畫布 */}
          <canvas ref={canvasRef} width="64" height="64" className="hidden" />

          {/* 舞台大黑幕 */}
          <div className={curtainStyle} />

          {/* 🛠️ 手勢專用透明防護罩：僅在需要劃兩筆的階段開啟 pointer-events */}
          {(phase === 'SWIPE_1' || phase === 'SWIPE_2') && (
            <div 
              className="absolute inset-0 bg-transparent pointer-events-auto"
              onTouchStart={touchStart}
              onTouchEnd={touchEnd}
            />
          )}

          {/* UI 元件層 */}
          <div className="absolute inset-0 flex flex-col items-center justify-center p-6 text-center">
            
            {phase === 'START' && (
              <button 
                className="pointer-events-auto px-10 py-3.5 border border-zinc-700 text-zinc-200 rounded-full bg-zinc-950/70 backdrop-blur-md tracking-[0.2em] text-sm font-light active:scale-95 transition-all shadow-xl"
                onClick={() => setPhase('SWIPE_1')}
              >
                INITIALIZE
              </button>
            )}

            {(phase === 'SWIPE_1' || phase === 'SWIPE_2') && (
              <div className="flex flex-col items-center tracking-[0.3em] text-zinc-400 text-xs font-light">
                <div 
                  className="w-8 h-8 border border-dashed border-zinc-500 mb-6 transition-transform duration-500 ease-out"
                  style={{ transform: `rotate(${boxRotation}deg)` }}
                />
                {phase === 'SWIPE_1' ? 'Swipe Up to Start' : 'Swipe 2nd Time'}
              </div>
            )}

            {phase === 'SEARCHING' && (
              <div className="text-cyan-500 tracking-[0.3em] font-light animate-pulse text-xs bg-black/40 px-6 py-2 rounded-full border border-cyan-950/50 backdrop-blur-sm">
                Searching...
              </div>
            )}

            {/* 撲克牌由 AR 空間飛躍至螢幕中央的終極動畫載體 */}
            {(phase === 'REVEAL_ZOOM' || phase === 'DETECT_LIGHT' || phase === 'VANISH') && (
              <img 
                src="https://raw.githubusercontent.com/hiukim/mind-ar-js/master/examples/image-tracking/assets/card-example/card.png" 
                className={`absolute top-1/2 left-1/2 w-52 shadow-[0_0_50px_rgba(0,0,0,0.9)] origin-center ${phase === 'VANISH' ? 'animate-card-vanish' : 'animate-card-zoom'}`}
                alt="Revealed Card"
              />
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<MagicStage />);
  </script>
</body>
</html>
