<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>AR Magic - Production Fix</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
  
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image.prod.js"></script>

  <style>
    /* 強制環境徹底全螢幕，絕不允許被任何組件擠壓 */
    html, body, #root {
      margin: 0 !important; padding: 0 !important;
      width: 100% !important; height: 100% !important;
      overflow: hidden !important; background-color: #000 !important;
      position: fixed !important; top: 0 !important; left: 0 !important;
    }

    /* 修正 MindAR 自動產生的視訊流，強制鎖定置底全螢幕 */
    video {
      position: fixed !important; top: 0 !important; left: 0 !important;
      width: 100vw !important; height: 100vh !important;
      object-fit: cover !important; z-index: 1 !important;
    }

    /* 4. 撲克牌衝向螢幕中央放大 */
    @keyframes centerZoom {
      0% { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
      100% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
    }
    .animate-card-zoom { animation: centerZoom 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

    /* 5. 手遮鏡頭：極速分子化消失 */
    @keyframes fastVanish {
      0% { opacity: 1; transform: translate(-50%, -50%) scale(1.3); filter: blur(0px); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(0.1); filter: blur(20px); }
    }
    .animate-card-vanish { animation: fastVanish 0.18s ease-in forwards; }
  </style>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function MagicApp() {
      // 狀態機：SWIPE_1 -> SWIPE_2 -> SEARCHING -> REVEAL_SLOW -> REVEAL_ZOOM -> DETECT_LIGHT -> VANISH
      const [phase, setPhase] = useState('SWIPE_1');
      const [boxRotation, setBoxRotation] = useState(0);
      const [boxOpacity, setBoxOpacity] = useState(1);
      
      const mindarThreeRef = useRef(null);
      const canvasRef = useRef(null);
      const touchStartPos = useRef({ x: 0, y: 0 });

      // 🎥 網頁載入立刻、無條件啟動相機 (解決一開始就黑屏或相機死機的問題)
      useEffect(() => {
        const startCameraInstance = async () => {
          try {
            // 使用純 JS 的 MindARImageTarget，繞過 A-Frame 的排版與跨域 Bug
            const mindarImage = new window.MINDAR.IMAGE.MindARImage({
              imageTargetSrc: 'https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.2/examples/image-tracking/assets/card-example/targets.mind',
              maxTrack: 1,
              uiLoading: "no",
              uiError: "no"
            });

            mindarThreeRef.current = mindarImage;
            await mindarImage.start();

            // 監聽目標牌辨識成功事件
            mindarImage.on("targetFound", (index) => {
              setPhase((current) => {
                if (current === 'SEARCHING') {
                  return 'REVEAL_SLOW';
                }
                return current;
              });
            });
          } catch (err) {
            console.error("Camera failed:", err);
          }
        };

        startCameraInstance();

        // 組件卸載時自動釋放相機鏡頭
        return () => {
          if (mindarThreeRef.current) {
            mindarThreeRef.current.stop();
          }
        };
      }, []);

      // 魔術自動化時間軸
      useEffect(() => {
        let timer;
        if (phase === 'REVEAL_SLOW') {
          // 3秒黑幕完全吞噬現實後 -> 進入卡片彈出放大階段
          timer = setTimeout(() => setPhase('REVEAL_ZOOM'), 3000);
        } else if (phase === 'REVEAL_ZOOM') {
          // 放大停留 3 秒讓觀眾看清楚 -> 啟動手遮鏡頭測光防線
          timer = setTimeout(() => setPhase('DETECT_LIGHT'), 3000);
        }
        return () => clearTimeout(timer);
      }, [phase]);

      // 安全精準型測光迴圈
      useEffect(() => {
        let frameId;
        const checkDarkness = () => {
          if (phase === 'DETECT_LIGHT') {
            try {
              const video = document.querySelector('video');
              if (video && video.videoWidth > 0 && video.readyState >= 2 && canvasRef.current) {
                const ctx = canvasRef.current.getContext('2d', { willReadFrequently: true });
                ctx.drawImage(video, 0, 0, 64, 64);
                const frameData = ctx.getImageData(0, 0, 64, 64).data;
                
                let lightSum = 0;
                for (let i = 0; i < frameData.length; i += 16) {
                  lightSum += (frameData[i] + frameData[i+1] + frameData[i+2]) / 3;
                }
                const averageLight = lightSum / (frameData.length / 16);

                // 魔術師手掌完全蓋住鏡頭時觸放結局
                if (averageLight < 25) {
                  setPhase('VANISH');
                  return;
                }
              }
            } catch (e) {}
          }
          frameId = requestAnimationFrame(checkDarkness);
        };

        if (phase === 'DETECT_LIGHT') {
          frameId = requestAnimationFrame(checkDarkness);
        }
        return () => cancelAnimationFrame(frameId);
      }, [phase]);

      // 觸控滑動手勢偵測
      const handleTouchStart = (e) => {
        touchStartPos.current = { x: e.touches[0].clientX, y: e.touches[0].clientY };
      };

      const handleTouchEnd = (e) => {
        if (phase !== 'SWIPE_1' && phase !== 'SWIPE_2') return;

        const deltaX = e.changedTouches[0].clientX - touchStartPos.current.x;
        const deltaY = e.changedTouches[0].clientY - touchStartPos.current.y;
        const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);

        if (distance > 30) {
          if (phase === 'SWIPE_1') {
            // 劃第一筆：決定方塊順時針或逆時針翻轉 90 度
            setBoxRotation(deltaX > 0 || deltaY > 0 ? 90 : -90);
            setPhase('SWIPE_2');
          } else if (phase === 'SWIPE_2') {
            // 劃第二筆：方塊直接淡出消失，進入辨識階段
            setBoxOpacity(0);
            setPhase('SEARCHING');
          }
        }
      };

      // 🎬 核心黑幕控制（前三階段完全透明，辨識成功後以 3 秒柔和吞噬整個世界）
      const getCurtainStyle = () => {
        const base = { position: 'fixed', inset: 0, backgroundColor: '#000', pointerEvents: 'none', zIndex: 10 };
        if (phase === 'SWIPE_1' || phase === 'SWIPE_2' || phase === 'SEARCHING') {
          return { ...base, opacity: 0, transition: 'none' };
        }
        if (phase === 'REVEAL_SLOW' || phase === 'REVEAL_ZOOM' || phase === 'DETECT_LIGHT') {
          return { ...base, opacity: 1, transition: 'opacity 3.0s ease-in-out' }; // 3秒平滑黑屏
        }
        if (phase === 'VANISH') {
          return { ...base, opacity: 0, transition: 'opacity 0.2s ease-out' }; // 結局手撤開，黑幕瞬間退去
        }
        return base;
      };

      return (
        <div 
          className="w-full h-full relative flex flex-col items-center justify-center"
          style={{ 
            zIndex: 50, 
            pointerEvents: (phase === 'SWIPE_1' || phase === 'SWIPE_2') ? 'auto' : 'none' 
          }}
          onTouchStart={handleTouchStart}
          onTouchEnd={handleTouchEnd}
        >
          {/* 隱藏的測光畫布 */}
          <canvas ref={canvasRef} width="64" height="64" className="hidden" />

          {/* 動態調光夾層黑幕 */}
          <div style={getCurtainStyle()} />

          {/* 頂部狀態引導文字 */}
          <div className="absolute top-24 left-0 right-0 text-center tracking-[0.25em] text-zinc-300 text-xs font-light select-none z-20">
            {phase === 'SWIPE_1' && 'Swipe to start'}
            {phase === 'SWIPE_2' && 'Swipe again'}
            {phase === 'SEARCHING' && (
              <span className="text-cyan-400 animate-pulse bg-zinc-950/80 px-6 py-2.5 rounded-full border border-cyan-900/50 backdrop-blur-md">
                Searching...
              </span>
            )}
          </div>

          {/* 畫面中央：2D 旋轉方塊 */}
          {(phase === 'SWIPE_1' || phase === 'SWIPE_2' || phase === 'SEARCHING') && (
            <div 
              className="w-12 h-12 border border-dashed border-zinc-400 rounded-lg transition-all duration-300 ease-out z-20"
              style={{ 
                transform: `rotate(${boxRotation}deg)`, 
                opacity: boxOpacity 
              }}
            />
          )}

          {/* 🎬 終極魔術高潮：撲克牌掙脫虛擬界，在全黑中放大顯現 */}
          {(phase === 'REVEAL_ZOOM' || phase === 'DETECT_LIGHT' || phase === 'VANISH') && (
            <img 
              src="https://raw.githubusercontent.com/hiukim/mind-ar-js/master/examples/image-tracking/assets/card-example/card.png" 
              className={`absolute top-1/2 left-1/2 w-56 shadow-[0_0_50px_rgba(0,0,0,0.9)] origin-center z-30 ${phase === 'VANISH' ? 'animate-card-vanish' : 'animate-card-zoom'}`}
              alt="Magic Card"
            />
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<MagicApp />);
  </script>
</body>
</html>
