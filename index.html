<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>AR Magic - Pure Flow Edition</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

  <style>
    /* 讓基礎環境完美重設，不對 A-Frame 做多餘包裹 */
    html, body {
      margin: 0 !important; padding: 0 !important;
      width: 100% !important; height: 100% !important;
      overflow: hidden !important; background-color: #000 !important;
    }

    /* 隱藏 MindAR 預設載入與錯誤 UI */
    .mindar-ui-overlay, .a-dialog-allow-button { display: none !important; }

    /* 5. 結局動畫：卡片打破空間飛向螢幕中央放大 */
    @keyframes climaxZoom {
      0% { transform: translate(-50%, -50%) scale(0.4); opacity: 0; }
      100% { transform: translate(-50%, -50%) scale(1.35); opacity: 1; }
    }
    .animate-card-zoom { animation: climaxZoom 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

    /* 手遮鏡頭：灰飛煙滅極速消失 */
    @keyframes molecularVanish {
      0% { opacity: 1; transform: translate(-50%, -50%) scale(1.35); filter: blur(0px) brightness(1); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(0.2); filter: blur(20px) brightness(2.5); }
    }
    .animate-card-vanish { animation: molecularVanish 0.18s ease-in forwards; }
  </style>

  <script>
    // 全域變數鎖，負責跨框架通訊
    window.isTargetLocked = false;

    AFRAME.registerComponent('magic-tracker', {
      init: function () {
        this.el.addEventListener('targetFound', () => {
          window.isTargetLocked = true;
          if (window.onTargetFoundTrigger) window.onTargetFoundTrigger();
        });
        this.el.addEventListener('targetLost', () => {
          window.isTargetLocked = false;
        });
      }
    });
  </script>
</head>
<body>

  <a-scene 
    mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.2/examples/image-tracking/assets/card-example/targets.mind; autoStart: true; uiLoading: no; uiError: no;" 
    color-space="sRGB" 
    renderer="colorManagement: true, physicallyCorrectLights" 
    vr-mode-ui="enabled: false" 
    device-orientation-permission-ui="enabled: false"
  >
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    <a-entity mindar-image-target="targetIndex: 0" magic-tracker>
       <a-image 
         id="arGhostCard"
         src="https://raw.githubusercontent.com/hiukim/mind-ar-js/master/examples/image-tracking/assets/card-example/card.png" 
         position="0 0 0.01" 
         height="1" width="0.75" 
         material="opacity: 0; transparent: true;"
       ></a-image>
    </a-entity>
  </a-scene>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function MagicController() {
      // 狀態鏈：SWIPE_1 -> SWIPE_2 -> SEARCHING -> REVEAL_SLOW -> REVEAL_ZOOM -> DETECT_LIGHT -> VANISH
      const [phase, setPhase] = useState('SWIPE_1');
      const [boxTransform, setBoxTransform] = useState('rotateX(0deg) rotateY(0deg)');
      const [boxOpacity, setBoxOpacity] = useState(1);
      const canvasRef = useRef(null);
      const touchStart = useRef({ x: 0, y: 0 });

      // 監聽 MindAR 捕捉事件
      useEffect(() => {
        window.onTargetFoundTrigger = () => {
          setPhase((current) => {
            if (current === 'SEARCHING') {
              triggerArCardFadeIn();
              return 'REVEAL_SLOW';
            }
            return current;
          });
        };
      }, []);

      // 安全防禦鎖：若進入搜尋階段時卡牌早已在鏡頭內，立即強制作動
      useEffect(() => {
        if (phase === 'SEARCHING' && window.isTargetLocked) {
          triggerArCardFadeIn();
          setPhase('REVEAL_SLOW');
        }
      }, [phase]);

      // 驅動 A-Frame 內部的虛擬卡牌進行 5 秒緩慢顯影
      const triggerArCardFadeIn = () => {
        const el = document.querySelector('#arGhostCard');
        if (el) {
          el.setAttribute('animation', 'property: components.material.material.opacity; from: 0; to: 1; dur: 5000; easing: linear;');
        }
      };

      // ⏱️ 電影級魔術時序控制齒輪
      useEffect(() => {
        let timer;
        if (phase === 'REVEAL_SLOW') {
          // 5秒顯影結束 -> 撲克牌瞬間彈向大螢幕中央
          timer = setTimeout(() => setPhase('REVEAL_ZOOM'), 5000);
        } else if (phase === 'REVEAL_ZOOM') {
          // 放大飛出並停留 3 秒 -> 悄悄喚醒環境光感應器
          timer = setTimeout(() => setPhase('DETECT_LIGHT'), 3000);
        }
        return () => clearTimeout(timer);
      }, [phase]);

      // 👁️ 常駐型高防禦環境測光系統 (消滅所有 Script Error)
      useEffect(() => {
        let animFrameId;
        const checkLensDarkness = () => {
          if (phase === 'DETECT_LIGHT') {
            try {
              const video = document.querySelector('video');
              if (video && video.videoWidth > 0 && video.readyState >= 2 && canvasRef.current) {
                const ctx = canvasRef.current.getContext('2d', { willReadFrequently: true });
                ctx.drawImage(video, 0, 0, 64, 64);
                const rgbData = ctx.getImageData(0, 0, 64, 64).data;
                
                let lightSum = 0;
                for (let i = 0; i < rgbData.length; i += 16) {
                  lightSum += (rgbData[i] + rgbData[i+1] + rgbData[i+2]) / 3;
                }
                const luxAverage = lightSum / (rgbData.length / 16);

                // 當魔術師伸手蓋住後置鏡頭時，感光值跌破 30
                if (luxAverage < 30) {
                  setPhase('VANISH');
                  return; // 結束測光
                }
              }
            } catch (e) {
              // 靜默等待視訊流就位
            }
          }
          animFrameId = requestAnimationFrame(checkLensDarkness);
        };

        if (phase === 'DETECT_LIGHT') {
          animFrameId = requestAnimationFrame(checkLensDarkness);
        }
        return () => cancelAnimationFrame(animFrameId);
      }, [phase]);

      // 👆 全螢幕全域觸控手勢演算 (解決點擊死角與 A-Frame 攔截問題)
      const handleTouchStart = (e) => {
        touchStart.current = { x: e.touches[0].clientX, y: e.touches[0].clientY };
      };

      const handleTouchEnd = (e) => {
        if (phase !== 'SWIPE_1' && phase !== 'SWIPE_2') return;

        const moveX = e.changedTouches[0].clientX - touchStart.current.x;
        const moveY = e.changedTouches[0].clientY - touchStart.current.y;
        const swipeDistance = Math.sqrt(moveX * moveX + moveY * moveY);

        // 劃牌靈敏度閾值：只要滑動超過 30 像素即判定成功
        if (swipeDistance > 30) {
          if (phase === 'SWIPE_1') {
            // 2. 第一筆劃下：感知手勢方向，讓方塊進行滑順的同方向 3D 翻轉
            if (Math.abs(moveX) > Math.abs(moveY)) {
              setBoxTransform(moveX > 0 ? 'rotateY(90deg)' : 'rotateY(-90deg)'); // 左右滑
            } else {
              setBoxTransform(moveY > 0 ? 'rotateX(-90deg)' : 'rotateX(90deg)'); // 上下滑
            }
            setPhase('SWIPE_2');
          } else if (phase === 'SWIPE_2') {
            // 3. 第二筆劃下：方塊立刻蒸發，進入 Searching 狀態
            setBoxOpacity(0);
            setPhase('SEARCHING');
          }
        }
      };

      // 🖤 高精度夾層黑幕樣式計算（動態控制透明度，確保不阻擋相機渲染）
      const getCurtainStyle = () => {
        const baseStyle = { position: 'fixed', inset: 0, backgroundColor: '#000', pointerEvents: 'none', zIndex: 10 };
        
        if (phase === 'SWIPE_1') {
          return { ...baseStyle, opacity: 1, transition: 'none' }; // 1. 初始全黑
        }
        if (phase === 'SWIPE_2' || phase === 'SEARCHING') {
          return { ...baseStyle, opacity: 0, transition: 'opacity 0.5s cubic-bezier(0.2, 1, 0.3, 1)' }; // 2. 第一筆下，0.5秒淡出透出相機
        }
        if (phase === 'REVEAL_SLOW' || phase === 'REVEAL_ZOOM' || phase === 'DETECT_LIGHT') {
          return { ...baseStyle, opacity: 1, transition: 'opacity 3.0s ease-in-out' }; // 4. 鎖定卡牌，3秒黑幕緩慢吞噬實景
        }
        if (phase === 'VANISH') {
          return { ...baseStyle, opacity: 0, transition: 'opacity 0.2s ease-out' }; // 5. 灰飛煙滅，黑幕秒退
        }
        return baseStyle;
      };

      return (
        <div>
          {/* 隱藏型環境光感分析畫布 */}
          <canvas ref={canvasRef} width="64" height="64" className="hidden" />

          {/* 🎬 舞台黑幕（置於相機之上，AR畫布之下） */}
          <div style={getCurtainStyle()} />

          {/* 🛠️ 全域觸控攔截夾層：僅在需要劃兩筆的選牌階段甦醒 (z-index: 100) */}
          {(phase === 'SWIPE_1' || phase === 'SWIPE_2') && (
            <div 
              className="fixed inset-0 z-[100] bg-transparent"
              onTouchStart={handleTouchStart}
              onTouchEnd={handleTouchEnd}
            />
          )}

          {/* 視覺 UI 表現層 (z-index: 30，凌駕於 AR 畫布之上) */}
          <div className="fixed inset-0 z-[30] flex flex-col items-center justify-center p-6 pointer-events-none select-none -webkit-user-select-none">
            
            {/* 頂部狀態魔術導引字樣 */}
            <div className="absolute top-20 text-center tracking-[0.25em] text-zinc-300 text-xs font-light transition-all duration-300">
              {phase === 'SWIPE_1' && 'Swipe to start'}
              {phase === 'SWIPE_2' && 'Swipe again'}
              {phase === 'SEARCHING' && (
                <span className="text-cyan-400 animate-pulse bg-zinc-950/80 px-6 py-2.5 rounded-full border border-cyan-900/50 backdrop-blur-md">
                  Searching...
                </span>
              )}
            </div>

            {/* 核心 3D 翻轉互動方塊 */}
            {(phase === 'SWIPE_1' || phase === 'SWIPE_2' || phase === 'SEARCHING') && (
              <div 
                className="w-12 h-12 border border-dashed border-zinc-400 rounded-lg transition-all cubic-bezier(0.16, 1, 0.3, 1)"
                style={{ 
                  transform: boxTransform, 
                  opacity: boxOpacity,
                  transitionDuration: phase === 'SWIPE_2' ? '0.5s' : '0.3s',
                  perspective: '800px'
                }}
              />
            )}

            {/* 5. 終極高潮：撲克牌實體化，飛至 HTML 最頂層中央放大與消失 */}
            {(phase === 'REVEAL_ZOOM' || phase === 'DETECT_LIGHT' || phase === 'VANISH') && (
              <img 
                src="https://raw.githubusercontent.com/hiukim/mind-ar-js/master/examples/image-tracking/assets/card-example/card.png" 
                className={`absolute top-1/2 left-1/2 w-52 shadow-[0_0_60px_rgba(0,0,0,0.95)] origin-center ${phase === 'VANISH' ? 'animate-card-vanish' : 'animate-card-zoom'}`}
                alt="Climax Card"
              />
            )}

          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<MagicController />);
  </script>
</body>
</html>
