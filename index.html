<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AR 實體牌背魔術 - 終極穩定版</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

  <style>
    /* --- 終極空間架構：絕對鎖定全螢幕，消滅所有白邊 --- */
    html, body, #root {
      position: fixed; top: 0; left: 0;
      width: 100vw; height: 100vh;
      margin: 0; padding: 0;
      background-color: #000; /* 底層純黑，避免載入閃白 */
      overflow: hidden;
      touch-action: none; user-select: none; -webkit-user-select: none;
    }
    
    /* 隱藏 MindAR 預設載入 UI */
    .a-dialog-allow-button, .mindar-ui-overlay { display: none !important; }
    
    /* B2: 相機層 - 強制置中且完全覆蓋螢幕 */
    video {
      position: fixed !important;
      top: 50% !important; left: 50% !important;
      min-width: 100vw !important; min-height: 100vh !important;
      transform: translate(-50%, -50%) !important;
      object-fit: cover !important;
      z-index: -2 !important;
    }
    
    /* 2F: AR 畫布層 - 強制對齊全螢幕 */
    .a-canvas {
      position: fixed !important;
      top: 0 !important; left: 0 !important;
      width: 100vw !important; height: 100vh !important;
      z-index: 20 !important; pointer-events: none !important;
    }

    /* --- 動畫設定 --- */
    @keyframes screenZoom {
      0% { transform: translate(-50%, -50%) scale(0.6); opacity: 0; }
      100% { transform: translate(-50%, -50%) scale(1.5); opacity: 1; }
    }
    .animate-screen-zoom { animation: screenZoom 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

    @keyframes fastVanish {
      0% { opacity: 1; transform: translate(-50%, -50%) scale(1.5); filter: blur(0px); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); filter: blur(10px) brightness(2); }
    }
    .animate-fast-vanish { animation: fastVanish 0.15s ease-out forwards; }
  </style>

  <script>
    AFRAME.registerComponent('target-handler', {
      init: function () {
        this.el.addEventListener('targetFound', () => {
          if (window.currentPhase === 'SEARCHING') {
            window.triggerReveal();
            const arCard = document.querySelector('#arCard');
            if (arCard) {
              arCard.setAttribute('animation', 'property: components.material.material.opacity; from: 0; to: 1; dur: 5000; easing: linear;');
            }
          }
        });
      }
    });
  </script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function MagicApp() {
      const [phase, setPhase] = useState('START');
      const [boxRotation, setBoxRotation] = useState(0);
      const canvasRef = useRef(null);

      // 讓 A-Frame 可以呼叫 React 狀態
      useEffect(() => { window.currentPhase = phase; }, [phase]);
      useEffect(() => {
        window.triggerReveal = () => setPhase('REVEAL_SLOW');
      }, []);

      // 👆 全域觸控偵測：解決「無法畫兩筆」的問題
      useEffect(() => {
        let startY = 0;
        const handleTouchStart = (e) => {
          startY = e.touches[0].clientY;
        };
        const handleTouchEnd = (e) => {
          const endY = e.changedTouches[0].clientY;
          if (startY - endY > 40) { // 向上滑動超過 40px
            setPhase((prev) => {
              if (prev === 'SWIPE_1') {
                setBoxRotation(90);
                return 'SWIPE_2';
              } else if (prev === 'SWIPE_2') {
                return 'SEARCHING';
              }
              return prev;
            });
          }
        };

        window.addEventListener('touchstart', handleTouchStart);
        window.addEventListener('touchend', handleTouchEnd);
        return () => {
          window.removeEventListener('touchstart', handleTouchStart);
          window.removeEventListener('touchend', handleTouchEnd);
        };
      }, []); // 空陣列確保只綁定一次，依賴 functional state update

      // 🎬 時序引擎
      useEffect(() => {
        let timer;
        if (phase === 'REVEAL_SLOW') {
          timer = setTimeout(() => setPhase('REVEAL_STAY'), 5000);
        } else if (phase === 'REVEAL_STAY') {
          timer = setTimeout(() => setPhase('REVEAL_ZOOM'), 3000);
        } else if (phase === 'REVEAL_ZOOM') {
          timer = setTimeout(() => setPhase('DETECTION_ACTIVE'), 3000);
        }
        return () => clearTimeout(timer);
      }, [phase]);

      // 👁️ 亮度感應常駐系統
      useEffect(() => {
        let animFrame;
        const checkBrightness = () => {
          if (window.currentPhase === 'DETECTION_ACTIVE') {
            const video = document.querySelector('video');
            if (video && canvasRef.current) {
              const ctx = canvasRef.current.getContext('2d', { willReadFrequently: true });
              ctx.drawImage(video, 0, 0, 64, 64);
              const data = ctx.getImageData(0, 0, 64, 64).data;
              let brightness = 0;
              for (let i = 0; i < data.length; i += 16) {
                brightness += (data[i] + data[i+1] + data[i+2]) / 3;
              }
              const avgBrightness = brightness / (data.length / 16);
              if (avgBrightness < 40) {
                setPhase('VANISH');
                return;
              }
            }
          }
          animFrame = requestAnimationFrame(checkBrightness);
        };
        checkBrightness();
        return () => cancelAnimationFrame(animFrame);
      }, []);

      // 黑幕過渡樣式設定
      let overlayClass = "fixed inset-0 z-10 pointer-events-none ";
      if (phase === 'START' || phase === 'SWIPE_1') {
        overlayClass += "bg-black opacity-100 transition-opacity duration-0";
      } else if (phase === 'SWIPE_2' || phase === 'SEARCHING') {
        overlayClass += "bg-black opacity-0 transition-opacity duration-500";
      } else if (phase === 'REVEAL_SLOW' || phase === 'REVEAL_STAY' || phase === 'REVEAL_ZOOM' || phase === 'DETECTION_ACTIVE') {
        overlayClass += "bg-black opacity-100 transition-opacity duration-3000";
      } else if (phase === 'VANISH') {
        overlayClass += "bg-black opacity-0 transition-opacity duration-200";
      }

      return (
        <div className="w-full h-full">
          
          <canvas ref={canvasRef} width="64" height="64" className="hidden" />
          <div className={overlayClass}></div>

          {/* 頂樓 UI 層 */}
          <div className="fixed inset-0 z-50 flex flex-col items-center justify-center pointer-events-none">
            
            {phase === 'START' && (
              <button 
                // 改用 Inline Style 確保樣式絕對生效，不被 A-Frame 蓋掉
                style={{
                  pointerEvents: 'auto',
                  padding: '12px 24px', border: '1px solid #4b5563', borderRadius: '9999px',
                  color: '#d1d5db', letterSpacing: '0.1em', fontSize: '14px', background: 'transparent'
                }}
                onClick={() => setPhase('SWIPE_1')}
              >
                START SYSTEM
              </button>
            )}

            {(phase === 'SWIPE_1' || phase === 'SWIPE_2') && (
              <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', color: '#9ca3af', letterSpacing: '0.2em', fontSize: '14px' }}>
                <div 
                  style={{
                    width: '48px', height: '48px', border: '1px dashed #6b7280',
                    marginBottom: '24px', transition: 'transform 0.5s ease-out',
                    transform: `rotate(${boxRotation}deg)`
                  }}
                ></div>
                {phase === 'SWIPE_1' ? 'SWIPE UP' : 'SWIPE AGAIN'}
              </div>
            )}

            {phase === 'SEARCHING' && (
              <div style={{ color: '#0891b2', letterSpacing: '0.3em', fontSize: '14px', animation: 'pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite' }}>
                SEARCHING...
              </div>
            )}

            {(phase === 'REVEAL_ZOOM' || phase === 'DETECTION_ACTIVE' || phase === 'VANISH') && (
              <img 
                src="https://raw.githubusercontent.com/hiukim/mind-ar-js/master/examples/image-tracking/assets/card-example/card.png" 
                className={`absolute top-1/2 left-1/2 w-48 shadow-2xl ${phase === 'VANISH' ? 'animate-fast-vanish' : 'animate-screen-zoom'}`}
                alt="Target Card"
              />
            )}
          </div>

          {/* 底層 MindAR 系統 */}
          <a-scene 
            mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.2/examples/image-tracking/assets/card-example/targets.mind; autoStart: true;" 
            color-space="sRGB" 
            renderer="colorManagement: true, physicallyCorrectLights" 
            vr-mode-ui="enabled: false" 
            device-orientation-permission-ui="enabled: false"
          >
            <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
            <a-entity mindar-image-target="targetIndex: 0" target-handler>
               {phase !== 'REVEAL_ZOOM' && phase !== 'DETECTION_ACTIVE' && phase !== 'VANISH' && (
                 <a-image 
                   id="arCard"
                   src="https://raw.githubusercontent.com/hiukim/mind-ar-js/master/examples/image-tracking/assets/card-example/card.png" 
                   position="0 0 0.1" 
                   height="1" width="0.75" 
                   material="opacity: 0; transparent: true;"
                 ></a-image>
               )}
            </a-entity>
          </a-scene>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<MagicApp />);
  </script>
</body>
</html>
