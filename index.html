<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>AR Magic - Pure Camera Stable Edition</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>

  <style>
    /* 強制網頁環境全螢幕，防止手機瀏覽器排版壓扁 */
    html, body {
      margin: 0 !important; padding: 0 !important;
      width: 100% !important; height: 100% !important;
      overflow: hidden !important; background-color: #000 !important;
    }

    /* 關鍵：強制把 A-Frame 與 MindAR 預設的黑色底色與 UI 拔除，露出底層相機 */
    .mindar-ui-overlay, .a-dialog-allow-button { display: none !important; }
    
    a-scene {
      position: fixed !important; top: 0 !important; left: 0 !important;
      width: 100vw !important; height: 100vh !important;
      z-index: 1 !important;
    }
    
    /* 確保 A-Frame 內置的 canvas 與 video 100% 滿版（解決半屏或死黑問題） */
    .a-canvas {
      width: 100% !important; height: 100% !important;
      object-fit: cover !important;
    }

    /* 終極高潮：撲克牌衝向螢幕中央放大 */
    @keyframes centerZoom {
      0% { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
      100% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
    }
    .animate-card-zoom { animation: centerZoom 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

    /* 手遮鏡頭：極速分子化灰飛煙滅 */
    @keyframes fastVanish {
      0% { opacity: 1; transform: translate(-50%, -50%) scale(1.3); filter: blur(0px); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(0.1); filter: blur(20px); }
    }
    .animate-card-vanish { animation: fastVanish 0.18s ease-in forwards; }
  </style>

  <script>
    // 全域變數與 A-Frame 組件橋接（官方標準辨識管道，100% 觸發）
    window.isTargetDetected = false;

    AFRAME.registerComponent('magic-tracker', {
      init: function () {
        this.el.addEventListener('targetFound', () => {
          window.isTargetDetected = true;
          if (window.onMagicTargetFound) window.onMagicTargetFound();
        });
        this.el.addEventListener('targetLost', () => {
          window.isTargetDetected = false;
        });
      }
    });
  </script>
</head>
<body>

  <a-scene 
    mindar-image="imageTargetSrc: https://cdn.jsdelivr.net/gh/hiukim/mind-ar-js@1.2.2/examples/image-tracking/assets/card-example/targets.mind; autoStart: true; uiLoading: no; uiError: no;" 
    color-space="sRGB" 
    renderer="colorManagement: true, physicallyCorrectLights" 
    vr-mode-ui="enabled: false" 
    device-orientation-permission-ui="enabled: false"
  >
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
    
    <a-entity mindar-image-target="targetIndex: 0" magic-tracker>
      </a-entity>
  </a-scene>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function MagicApp() {
      // 狀態機：SWIPE_1 -> SWIPE_2 -> SEARCHING -> REVEAL_SLOW -> REVEAL_ZOOM -> DETECT_LIGHT -> VANISH
      const [phase, setPhase] = useState('SWIPE_1');
      const [boxRotation, setBoxRotation] = useState(0);
      const [boxOpacity, setBoxOpacity] = useState(1);
      
      const canvasRef = useRef(null);
      const touchStartPos = useRef({ x: 0, y: 0 });

      // 監聽底層 A-Frame 發出的辨識成功訊號
      useEffect(() => {
        window.onMagicTargetFound = () => {
          setPhase((current) => {
            if (current === 'SEARCHING') {
              return 'REVEAL_SLOW'; // 鎖定撲克牌，開始吞噬世界
            }
            return current;
          });
        };
      }, []);

      // 保險安全機制：如果魔術師切換到搜尋時，撲克牌早就已經在鏡頭裡
      useEffect(() => {
        if (phase === 'SEARCHING' && window.isTargetDetected) {
          setPhase('REVEAL_SLOW');
        }
      }, [phase]);

      // 魔術自動化時間軸
      useEffect(() => {
        let timer;
        if (phase === 'REVEAL_SLOW') {
          // 3秒黑幕慢慢全黑吞噬現實 -> 撲克牌從中央放大彈出
          timer = setTimeout(() => setPhase('REVEAL_ZOOM'), 3000);
        } else if (phase === 'REVEAL_ZOOM') {
          // 放大停留 3 秒讓觀眾看清楚 -> 啟動手遮鏡頭測光
          timer = setTimeout(() => setPhase('DETECT_LIGHT'), 3000);
        }
        return () => clearTimeout(timer);
      }, [phase]);

      // 安全精準型測光防線（抓取 MindAR 自動建立的 video 標籤）
      useEffect(() => {
        let frameId;
        const checkDarkness = () => {
          if (phase === 'DETECT_LIGHT') {
            try {
              const video = document.querySelector('video');
              if (video && video.videoWidth > 0 && video.readyState >= 2 && canvasRef.current) {
                const ctx = canvasRef.current.getContext('2d', { willReadFrequently: true });
                ctx.drawImage(video, 0, 0, 64, 64);
                const frameData = ctx.getImageData(0, 0, 64, 64).data;
                
                let lightSum = 0;
                for (let i = 0; i < frameData.length; i += 16) {
                  lightSum += (frameData[i] + frameData[i+1] + frameData[i+2]) / 3;
                }
                const averageLight = lightSum / (frameData.length / 16);

                // 當魔術師手掌完全覆蓋住鏡頭
                if (averageLight < 25) {
                  setPhase('VANISH');
                  return;
                }
              }
            } catch (e) {}
          }
          frameId = requestAnimationFrame(checkDarkness);
        };

        if (phase === 'DETECT_LIGHT') {
          frameId = requestAnimationFrame(checkDarkness);
        }
        return () => cancelAnimationFrame(frameId);
      }, [phase]);

      // 觸控滑動手勢
      const handleTouchStart = (e) => {
        touchStartPos.current = { x: e.touches[0].clientX, y: e.touches[0].clientY };
      };

      const handleTouchEnd = (e) => {
        if (phase !== 'SWIPE_1' && phase !== 'SWIPE_2') return;

        const deltaX = e.changedTouches[0].clientX - touchStartPos.current.x;
        const deltaY = e.changedTouches[0].clientY - touchStartPos.current.y;
        const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);

        if (distance > 30) {
          if (phase === 'SWIPE_1') {
            setBoxRotation(deltaX > 0 || deltaY > 0 ? 90 : -90); // 2D 順/逆時針翻轉
            setPhase('SWIPE_2');
          } else if (phase === 'SWIPE_2') {
            setBoxOpacity(0);
            setPhase('SEARCHING'); // 方塊消失，直接顯示相機並開始辨識
          }
        }
      };

      // 動態調光黑幕（前三階段 100% 透明露出實景，捕捉後 3 秒吞噬現實）
      const getCurtainStyle = () => {
        const base = { position: 'fixed', inset: 0, backgroundColor: '#000', pointerEvents: 'none', zIndex: 10 };
        if (phase === 'SWIPE_1' || phase === 'SWIPE_2' || phase === 'SEARCHING') {
          return { ...base, opacity: 0, transition: 'none' };
        }
        if (phase === 'REVEAL_SLOW' || phase === 'REVEAL_ZOOM' || phase === 'DETECT_LIGHT') {
          return { ...base, opacity: 1, transition: 'opacity 3.0s ease-in-out' }; // 3秒柔和黑屏
        }
        if (phase === 'VANISH') {
          return { ...base, opacity: 0, transition: 'opacity 0.2s ease-out' }; // 結局手撤開，黑幕瞬間退去
        }
        return base;
      };

      return (
        <div 
          className="fixed inset-0 w-full h-full flex flex-col items-center justify-center select-none z-[100]"
          style={{ pointerEvents: (phase === 'SWIPE_1' || phase === 'SWIPE_2') ? 'auto' : 'none' }}
          onTouchStart={handleTouchStart}
          onTouchEnd={handleTouchEnd}
        >
          {/* 隱藏的測光專用畫布 */}
          <canvas ref={canvasRef} width="64" height="64" className="hidden" />

          /* 夾層調光黑幕 */
          <div style={getCurtainStyle()} />

          {/* UI 引導文字層 */}
          <div className="absolute top-24 left-0 right-0 text-center tracking-[0.25em] text-white text-xs font-medium drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)] z-20">
            {phase === 'SWIPE_1' && 'Swipe to start'}
            {phase === 'SWIPE_2' && 'Swipe again'}
            {phase === 'SEARCHING' && (
              <span className="text-cyan-400 animate-pulse bg-zinc-950/80 px-6 py-2.5 rounded-full border border-cyan-900/50 backdrop-blur-md">
                Searching...
              </span>
            )}
          </div>

          {/* 畫面正中央：2D 旋轉方塊 */}
          {(phase === 'SWIPE_1' || phase === 'SWIPE_2' || phase === 'SEARCHING') && (
            <div 
              className="w-14 h-14 border-2 border-dashed border-white/80 rounded-xl transition-all duration-300 ease-out z-20 drop-shadow-[0_0_8px_rgba(0,0,0,0.5)]"
              style={{ 
                transform: `rotate(${boxRotation}deg)`, 
                opacity: boxOpacity 
              }}
            />
          )}

          {/* 🎬 終極魔術高潮：撲克牌全黑中飛出放大 */}
          {(phase === 'REVEAL_ZOOM' || phase === 'DETECT_LIGHT' || phase === 'VANISH') && (
            <img 
              src="https://raw.githubusercontent.com/hiukim/mind-ar-js/master/examples/image-tracking/assets/card-example/card.png" 
              className={`absolute top-1/2 left-1/2 w-56 shadow-[0_0_50px_rgba(0,0,0,0.95)] origin-center z-30 ${phase === 'VANISH' ? 'animate-card-vanish' : 'animate-card-zoom'}`}
              alt="Magic Card"
            />
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<MagicApp />);
  </script>
</body>
</html>
